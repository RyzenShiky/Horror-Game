<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Survival Engine v2.0</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* SCREEN OVERLAYS */
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        /* MENU STYLING */
        h1 {
            font-size: 3rem;
            color: #aa1111;
            margin-bottom: 5px;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(170, 17, 17, 0.6);
        }

        .version-tag {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 40px;
        }

        .btn-horror {
            background: #111;
            color: #ccc;
            border: 1px solid #444;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .btn-horror:hover:not(:disabled) {
            background: #aa1111;
            color: #fff;
            border-color: #ff3333;
            box-shadow: 0 0 15px rgba(170, 17, 17, 0.8);
        }

        .btn-horror:disabled {
            color: #444;
            border-color: #222;
            cursor: not-allowed;
        }

        /* HUD OVERLAY */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        #hud-wave-indicator {
            font-size: 1.8rem;
            color: #dd1111;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            font-weight: bold;
        }

        .bars-container {
            width: 250px;
        }

        .bar-wrapper {
            margin-bottom: 10px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #333;
            padding: 2px;
            position: relative;
        }

        .bar-fill {
            height: 16px;
            transition: width 0.1s linear;
        }

        #hp-bar { background: #aa1111; width: 100%; }
        #stamina-bar { background: #11aa44; width: 100%; }

        .bar-label {
            position: absolute;
            top: 2px;
            left: 8px;
            font-size: 0.75rem;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        .hud-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        #weap-ammo {
            font-size: 1.6rem;
            color: #eee;
            text-shadow: 2px 2px 4px #000;
        }

        /* RETICLE (CROSSHAIR) */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 4;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.4);
        }
        #crosshair::before { top: 4px; left: -5px; width: 20px; height: 2px; }
        #crosshair::after { top: -5px; left: 4px; width: 2px; height: 20px; }

        /* ENGINE DEBUG PANEL */
        #perf-debug {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid #222;
            padding: 12px;
            color: #888;
            font-size: 0.75rem;
            pointer-events: none;
            z-index: 6;
            line-height: 1.5;
        }
        .debug-green { color: #00ff44; font-weight: bold; }

        /* BLOOD VIGNETTE EFFECT */
        #blood-vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 100px rgba(150, 0, 0, 0.8), inset 0 0 200px rgba(100, 0, 0, 0.9);
            pointer-events: none;
            z-index: 3;
            display: none;
            animation: pulse-vignette 2s infinite alternate;
        }

        @keyframes pulse-vignette {
            0% { opacity: 0.5; }
            100% { opacity: 0.9; }
        }

        /* SETTING MENU OVERLAY */
        .setting-box {
            background: #111;
            border: 1px solid #333;
            padding: 30px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .setting-title {
            font-size: 1.4rem;
            color: #aa1111;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 1px;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        .setting-row input[type="checkbox"] {
            accent-color: #aa1111;
            cursor: pointer;
        }
        .setting-row input[type="range"] {
            accent-color: #aa1111;
            width: 120px;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="blood-vignette"></div>
    <div id="crosshair"></div>

    <div id="hud" class="hidden">
        <div class="hud-top">
            <div id="hud-wave-indicator">WAVE: 1 (0/10 Kills)</div>
            <div class="bars-container">
                <div class="bar-wrapper">
                    <div id="hp-bar" class="bar-fill"></div>
                    <div class="bar-label">VITALS: <span id="hp-txt">100</span>%</div>
                </div>
                <div class="bar-wrapper">
                    <div id="stamina-bar" class="bar-fill"></div>
                    <div class="bar-label">STAMINA</div>
                </div>
            </div>
        </div>
        <div class="hud-bottom">
            <div id="weap-ammo">AMMO: 30 / 30</div>
        </div>
    </div>

    <div id="perf-debug" class="hidden">
        <div id="fps-counter" class="debug-green">FPS: --</div>
        <div id="engine-status">Scale: 100% | Dist: 250m</div>
        <div id="three-drawcalls">Draw Calls: --</div>
        <div id="three-tris">Triangles: --</div>
        <div id="geo-info">XYZ: 0, 0 | Wave AI Active: 0</div>
    </div>

    <div id="main-menu" class="screen-overlay">
        <h1>DARK FOREST</h1>
        <div class="version-tag">ENGINE PROTOTYPE V2.0.0</div>
        <div id="loader-status" style="margin-bottom: 20px; font-size: 0.85rem; color: #888;">Menunggu Model 3D...</div>
        <button id="btn-play-normal" class="btn-horror" disabled>LOADING MODEL (0%)</button>
    </div>

    <div id="setting-menu" class="screen-overlay hidden">
        <div class="setting-box">
            <div class="setting-title">SYSTEM PAUSE</div>
            <div class="setting-row">
                <label>Senter Elektrik</label>
                <input type="checkbox" id="setting-flashlight" checked>
            </div>
            <div class="setting-row">
                <label>Sensitivitas Mouse</label>
                <input type="range" id="setting-sens" min="1" max="10" value="5">
            </div>
            <div class="setting-row">
                <label>Adaptive Throttling</label>
                <input type="checkbox" id="setting-adaptive" checked>
            </div>
            <button id="btn-resume-setting" class="btn-horror" style="width: 100%; padding: 10px; font-size: 1rem; margin-top: 10px;">RESUME GAME</button>
        </div>
    </div>

    <div id="game-over-screen" class="screen-overlay hidden">
        <h1 style="color: #ff0000; text-shadow: 0 0 20px #ff0000;">YOU DIED</h1>
        <div id="end-stats" style="margin-bottom: 30px; letter-spacing: 1px; color: #aaa;">Wave Reached: 1 | Total Kills: 0</div>
        <div>
            <button id="btn-restart" class="btn-horror" style="margin-right: 15px;">TRY AGAIN</button>
            <button id="btn-to-menu" class="btn-horror">MAIN MENU</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
